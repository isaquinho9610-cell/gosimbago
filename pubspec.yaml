name: gosimbago
description: 숭실대학교 국제처 업무관리 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.29
  path_provider: ^2.1.5
  path: ^1.9.1

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Preferences
  shared_preferences: ^2.3.5

  # HTTP
  http: ^1.2.2

  # Utils
  uuid: ^4.5.1
  intl: ^0.19.0
  flutter_animate: ^4.5.2
  table_calendar: ^3.1.3
  supabase_flutter: ^2.12.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.22.1
  freezed: ^2.5.8
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
